name: Test OpenClaw Plugin Mount

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-mount:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mount test (Linux/Mac)
        if: runner.os != 'Windows'
        run: npm run test:mount
        shell: bash

      - name: Run mount test (Windows)
        if: runner.os == 'Windows'
        run: npm run test:mount
        shell: powershell

      - name: Run full integration test
        run: npm run test:integration
        timeout-minutes: 5

  test-real-install:
    runs-on: ubuntu-latest
    needs: test-mount

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create mock OpenClaw environment
        run: |
          mkdir -p ~/.openclaw/extensions
          echo '{"version":"1.0.0","settings":{"autoLoad":true}}' > ~/.openclaw/openclaw.json

      - name: Run npm install (triggers postinstall)
        run: npm ci
        timeout-minutes: 3

      - name: Verify plugin is mounted
        run: |
          ls -la ~/.openclaw/extensions/
          test -L ~/.openclaw/extensions/repsclaw && echo "✓ Plugin mounted successfully"

      - name: Verify symlink target
        run: |
          readlink -f ~/.openclaw/extensions/repsclaw
          test -f ~/.openclaw/extensions/repsclaw/package.json && echo "✓ package.json accessible"
